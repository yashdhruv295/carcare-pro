<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarCare — Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }

body {
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  gap: 3cm;
  background:#0a0f1e;
  overflow:hidden;
  position:relative;
}

.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(99,102,241,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.07) 1px, transparent 1px);
  background-size:48px 48px;
  animation:gridMove 20s linear infinite;
  pointer-events:none;
}
@keyframes gridMove {
  from { background-position:0 0; }
  to   { background-position:48px 48px; }
}

.orb {
  position:absolute; border-radius:50%;
  filter:blur(90px); opacity:0.35;
  pointer-events:none;
  animation:orbFloat 10s ease-in-out infinite alternate;
}
.orb1 { width:420px; height:420px; background:#6366f1; top:-120px; left:-120px; animation-duration:12s; }
.orb2 { width:340px; height:340px; background:#06b6d4; bottom:-80px; right:-80px; animation-duration:9s; animation-delay:-4s; }
.orb3 { width:220px; height:220px; background:#a855f7; top:45%; left:55%; animation-duration:7s; animation-delay:-6s; }

@keyframes orbFloat {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(25px,20px) scale(1.12); }
}

.particle {
  position:absolute; border-radius:50%;
  pointer-events:none;
  animation:particleRise linear infinite;
}
@keyframes particleRise {
  0%   { transform:translateY(0) scale(1); opacity:0.7; }
  100% { transform:translateY(-100vh) scale(0.2); opacity:0; }
}

.card {
  position:relative; z-index:10;
  width:420px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(250, 4, 4, 0.1);
  border-radius:24px;
  padding:44px 40px 40px;
  animation:cardIn 3s cubic-bezier(0.22,1,0.36,1) both;
  transition:transform 0.5s ease;
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(50px) scale(0.95); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.card::before {
  content:'';
  position:absolute; inset:0;
  border-radius:24px;
  padding:1px;
  background:linear-gradient(135deg,rgba(99,102,241,0.6),rgba(6,182,212,0.3),rgba(168,85,247,0.4),rgba(99,102,241,0.6));
  background-size:300% 300%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out; mask-composite:exclude;
  animation:shimmerBorder 4s ease infinite;
  pointer-events:none;
}
@keyframes shimmerBorder {
  0%,100% { background-position:0% 50%; }
  50%      { background-position:100% 50%; }
}

.logo-wrap {
  display:flex; align-items:center; gap:10px;
  justify-content:center; margin-bottom:30px;
  animation:fadeDown 0.6s 0.2s both;
}
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-16px); }
  to   { opacity:1; transform:translateY(0); }
}
.logo-icon {
  width:46px; height:46px;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  border-radius:13px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; color:white;
  animation:iconPulse 2.5s ease infinite;
}
@keyframes iconPulse {
  0%,100% { box-shadow:0 0 0 0 rgba(99,102,241,0.5); }
  60%      { box-shadow:0 0 0 12px rgba(99,102,241,0); }
}
.logo-text { font-size:22px; font-weight:700; color:white; letter-spacing:-0.5px; }
.logo-text span { color:#06b6d4; }

.heading {
  font-size:26px; font-weight:700; color:white;
  text-align:center; margin-bottom:6px; letter-spacing:-0.5px;
  animation:fadeUp 0.6s 0.3s both;
}
.subheading {
  font-size:14px; color:rgba(76, 74, 74, 0.4);
  text-align:center; margin-bottom:32px; min-height:20px;
  animation:fadeUp 0.6s 0.4s both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.cursor {
  display:inline-block; width:2px; height:13px;
  background:#06b6d4; margin-left:2px; vertical-align:middle;
  animation:blink 0.9s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

.field { position:relative; margin-bottom:16px; }
.field:nth-child(1) { animation:fadeUp 0.6s 0.45s both; }
.field:nth-child(2) { animation:fadeUp 0.6s 0.55s both; }

.field-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:18px; color:rgba(255,255,255,0.3);
  pointer-events:none; transition:color 0.25s; z-index:1;
}
.field input {
  width:100%; padding:14px 14px 14px 44px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:12px; font-size:15px; color:white; outline:none;
  transition:border-color 0.25s, background 0.25s, box-shadow 0.25s, transform 0.2s;
}
.field input::placeholder { color:rgba(255,255,255,0.28); }
.field input:focus {
  border-color:#6366f1;
  background:rgba(99,102,241,0.09);
  box-shadow:0 0 0 4px rgba(99,102,241,0.15);
  transform:scale(1.01);
}
.field:focus-within .field-icon { color:#a5b4fc; }
.error-msg { display:none; font-size:12px; color:#f87171; margin-top:4px; padding-left:4px; }

.btn {
  width:100%; padding:15px; margin-top:8px;
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:white; border:none; border-radius:12px;
  font-size:15px; font-weight:600; cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s, background 0.3s;
  box-shadow:0 4px 20px rgba(99,102,241,0.4);
  display:flex; align-items:center; justify-content:center; gap:8px;
  animation:fadeUp 0.6s 0.65s both;
  position:relative; overflow:hidden;
}
.btn::after {
  content:''; position:absolute; top:50%; left:50%;
  width:0; height:0;
  background:rgba(255,255,255,0.12); border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width 0.5s, height 0.5s, opacity 0.5s; opacity:0;
}
.btn:hover::after { width:380px; height:380px; opacity:1; }
.btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(99,102,241,0.55); }
.btn:active { transform:scale(0.98); }
.btn-arrow { font-size:16px; transition:transform 0.2s; }
.btn:hover .btn-arrow { transform:translateX(4px); }

.loader {
  display:none; width:20px; height:20px;
  border:2.5px solid rgba(255,255,255,0.3);
  border-top-color:white; border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.trust-row {
  display:flex; justify-content:center; gap:20px;
  margin-top:24px;
  animation:fadeUp 0.6s 0.75s both;
}
.trust-item { display:flex; align-items:center; gap:5px; font-size:11.5px; color:rgba(255,255,255,0.28); }
.trust-item i { font-size:13px; }
</style>
</head>
<body>

<div class="grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon"><i class="ti ti-car" aria-hidden="true"></i></div>
    <div class="logo-text">Car<span>Care</span></div>
  </div>

  <h1 class="heading">Welcome back</h1>
  <p class="subheading" id="sub"></p>

  <form id="loginForm">
    <div class="field">
      <i class="ti ti-user field-icon" aria-hidden="true"></i>
      <input type="text" id="name" placeholder="Full name" required autocomplete="name">
      <div class="error-msg" id="nameError">Please enter your name</div>
    </div>

    <div class="field">
      <i class="ti ti-phone field-icon" aria-hidden="true"></i>
      <input type="tel" id="phone" placeholder="Phone number" required autocomplete="tel">
      <div class="error-msg" id="phoneError">Please enter a valid phone number</div>
    </div>

    <button type="submit" class="btn" id="submitBtn">
      <span id="btnText">Continue</span>
      <i class="ti ti-arrow-right btn-arrow" id="btnIcon" aria-hidden="true"></i>
      <div class="loader" id="loader"></div>
    </button>
  </form>

  <div class="trust-row">
    <div class="trust-item"><i class="ti ti-lock" aria-hidden="true"></i> Secure</div>
    <div class="trust-item"><i class="ti ti-shield-check" aria-hidden="true"></i> Private</div>
    <div class="trust-item"><i class="ti ti-bolt" aria-hidden="true"></i> Fast access</div>
  </div>
</div>




<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2zqF5at3r8eKG0Q7frxnS-byD1OW-vto",
  authDomain: "carcarepro-daf80.firebaseapp.com",
  projectId: "carcarepro-daf80",
  storageBucket: "carcarepro-daf80.firebasestorage.app",
  messagingSenderId: "1014143359387",
  appId: "1:1014143359387:web:d3ab7e58dcc73af4b8a93e"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Typing animation
const phrases = ["Sign in to your account", "Manage your vehicles", "Track your service history"];
let pi = 0, ci = 0, deleting = false;
const subEl = document.getElementById("sub");
function type() {
  const phrase = phrases[pi];
  if (!deleting) {
    subEl.innerHTML = phrase.slice(0, ++ci) + '<span class="cursor"></span>';
    if (ci === phrase.length) { deleting = true; setTimeout(type, 1600); return; }
    setTimeout(type, 55);
  } else {
    subEl.innerHTML = phrase.slice(0, --ci) + '<span class="cursor"></span>';
    if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; setTimeout(type, 300); return; }
    setTimeout(type, 30);
  }
}
setTimeout(type, 700);

// Floating particles
const colors = ["rgba(99,102,241,0.7)","rgba(6,182,212,0.7)","rgba(168,85,247,0.6)","rgba(255,255,255,0.35)"];
function spawnParticle() {
  const p = document.createElement("div");
  p.className = "particle";
  const size = Math.random() * 5 + 2;
  p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;bottom:${Math.random()*10}vh;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*4}s;`;
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 14000);
}
for (let i = 0; i < 20; i++) spawnParticle();
setInterval(spawnParticle, 1200);

// Card 3D tilt
const card = document.querySelector(".card");
document.addEventListener("mousemove", e => {
  const r  = card.getBoundingClientRect();
  const dx = (e.clientX - (r.left + r.width  / 2)) / (window.innerWidth  / 2);
  const dy = (e.clientY - (r.top  + r.height / 2)) / (window.innerHeight / 2);
  card.style.transform = `perspective(800px) rotateY(${dx*5}deg) rotateX(${-dy*5}deg)`;
});
document.addEventListener("mouseleave", () => {
  card.style.transition = "transform 0.6s ease";
  card.style.transform  = "perspective(800px) rotateY(0deg) rotateX(0deg)";
});
card.addEventListener("mouseenter", () => { card.style.transition = "transform 0.1s ease"; });

// Form submit
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const name  = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

  document.getElementById("nameError").style.display  = "none";
  document.getElementById("phoneError").style.display = "none";

  let valid = true;
  if (!name)            { document.getElementById("nameError").style.display  = "block"; valid = false; }
  if (phone.length < 6) { document.getElementById("phoneError").style.display = "block"; valid = false; }
  if (!valid) return;

  const btn = document.getElementById("submitBtn");
  document.getElementById("btnText").style.display = "none";
  document.getElementById("btnIcon").style.display = "none";
  document.getElementById("loader").style.display  = "block";
  btn.disabled = true;

  try {
    await addDoc(collection(db, "customers"), { name, phone, createdAt: new Date() });
    document.getElementById("loader").style.display  = "none";
    document.getElementById("btnText").textContent   = "✓  Welcome!";
    document.getElementById("btnText").style.display = "inline";
    btn.style.background = "linear-gradient(135deg,#059669,#047857)";
    btn.style.boxShadow  = "0 4px 20px rgba(5,150,105,0.5)";
    localStorage.setItem("name",  name);
    localStorage.setItem("phone", phone);
    setTimeout(() => { window.location.href = "dash.html"; }, 900);
  } catch(err) {
    document.getElementById("loader").style.display  = "none";
    document.getElementById("btnText").style.display = "inline";
    document.getElementById("btnIcon").style.display = "inline";
    btn.disabled = false;
    alert("Error: " + err.message);
  }
});
</script>
</body>
</html>
